<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - News Recommender</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#6366F1", // Indigo 500
                        "background-light": "#F9FAFB", // Gray 50
                        "background-dark": "#1F2937",   // Gray 800
                    },
                    fontFamily: {
                        display: ["Noto Sans KR", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem", // 8px
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark flex flex-col items-center justify-center min-h-screen font-display">
<div class="absolute top-8 left-8">
<button class="bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg shadow-md hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-300 flex items-center">
<span class="material-icons mr-2">home</span>
            홈 버튼
        </button>
</div>
<div class="w-full max-w-md p-8 space-y-8 bg-white dark:bg-gray-900 rounded-2xl shadow-2xl">
<div class="text-center">
<h1 class="text-3xl font-bold text-gray-900 dark:text-white">뉴스 추천 사이트</h1>
<p class="mt-2 text-sm text-gray-600 dark:text-gray-400">로그인하여 맞춤 뉴스를 받아보세요.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div>
<label class="sr-only" for="id">ID 입력</label>
<input class="appearance-none rounded-lg relative block w-full px-4 py-3 border border-gray-300 dark:border-gray-600 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm transition-colors" id="id" name="id" placeholder="ID 입력" required="" type="text"/>
</div>
<div>
<label class="sr-only" for="password">P.W 입력</label>
<input autocomplete="current-password" class="appearance-none rounded-lg relative block w-full px-4 py-3 border border-gray-300 dark:border-gray-600 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm transition-colors" id="password" name="password" placeholder="P.W 입력" required="" type="password"/>
</div>
<div>
<button class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-300" type="submit">
                    로그인
                </button>
</div>
</form>
<div class="flex items-center justify-center space-x-4 text-sm">
<a class="font-medium text-primary hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors" href="#">회원가입</a>
<span class="text-gray-300 dark:text-gray-600">|</span>
<a class="font-medium text-primary hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors" href="#">ID찾기</a>
<span class="text-gray-300 dark:text-gray-600">|</span>
<a class="font-medium text-primary hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors" href="#">P.W찾기</a>
</div>
</div>

</body></html>
