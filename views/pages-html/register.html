<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>회원가입</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#6366F1", // Indigo-500
            "background-light": "#F9FAFB", // Gray-50
            "background-dark": "#1F2937", // Gray-800
          },
          fontFamily: {
            display: ["Noto Sans KR", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.5rem", // 8px
          },
        },
      },
    };
  </script>
<style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 font-display">
<div class="min-h-screen flex flex-col items-center justify-center p-4">
<header class="w-full max-w-4xl mx-auto flex justify-between items-center py-4 px-6 fixed top-0 bg-background-light dark:bg-background-dark z-10">
<button class="flex items-center text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-icons">arrow_back</span>
<span class="ml-2 font-semibold">홈 버튼</span>
</button>
<div class="flex items-center space-x-4">
<a class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors font-medium" href="#">로그인</a>
<a class="bg-primary text-white px-4 py-2 rounded-lg font-semibold shadow-md hover:bg-indigo-700 transition-colors" href="#">회원가입</a>
</div>
</header>
<main class="w-full max-w-md mx-auto mt-24 bg-white dark:bg-gray-900 p-8 rounded-xl shadow-lg">
<h1 class="text-3xl font-bold text-center mb-8 text-gray-800 dark:text-white">회원가입</h1>
<form action="#" class="space-y-6">
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="name">이름</label>
<input class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="name" placeholder="이름 입력" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">성별</label>
<div class="flex space-x-4">
<label class="flex items-center space-x-2 text-gray-700 dark:text-gray-300">
<input class="text-primary focus:ring-primary" name="gender" type="radio" value="male"/>
<span>남</span>
</label>
<label class="flex items-center space-x-2 text-gray-700 dark:text-gray-300">
<input class="text-primary focus:ring-primary" name="gender" type="radio" value="female"/>
<span>여</span>
</label>
<label class="flex items-center space-x-2 text-gray-700 dark:text-gray-300">
<input class="text-primary focus:ring-primary" name="gender" type="radio" value="none"/>
<span>무응답</span>
</label>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="birthdate">생년월일</label>
<input class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="birthdate" placeholder="생년월일 입력 (예: 19990101)" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="userid">ID</label>
<input class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="userid" placeholder="ID 입력" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="password">비밀번호</label>
<input class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="password" placeholder="비밀번호 입력" type="password"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="password-confirm">비밀번호 확인</label>
<input class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="password-confirm" placeholder="비밀번호 재입력" type="password"/>
<p class="mt-2 text-sm text-red-500 hidden">불일치</p>
<p class="mt-2 text-sm text-green-500 hidden">일치</p>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="email">Email</label>
<div class="flex space-x-2">
<input class="flex-grow px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="email" placeholder="Email 입력" type="email"/>
<button class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" type="button">인증메일 발송</button>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="verification-code">인증코드</label>
<input class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition" id="verification-code" placeholder="인증코드 입력" type="text"/>
<p class="mt-2 text-sm text-green-500">인증되었습니다</p>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">정치성향</label>
<select class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary transition">
<option>선택하세요</option>
<option>진보</option>
<option>중도</option>
<option>보수</option>
<option>모르겠다</option>
</select>
</div>
<div class="pt-4">
<button class="w-full bg-primary text-white py-3 rounded-lg font-bold text-lg shadow-lg hover:bg-indigo-700 transition-all transform hover:scale-105" type="submit">회원가입 완료</button>
</div>
</form>
</main>
</div>

</body></html>
