<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>프로필 편집</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#6366F1", // Indigo 500
                        "background-light": "#F9FAFB", // Gray 50
                        "background-dark": "#1F2937", // Gray 800
                        "text-light": "#111827", // Gray 900
                        "text-dark": "#F9FAFB", // Gray 50
                        "muted-light": "#6B7280", // Gray 500
                        "muted-dark": "#9CA3AF", // Gray 400
                        "border-light": "#E5E7EB", // Gray 200
                        "border-dark": "#4B5563", // Gray 600
                        "card-light": "#FFFFFF",
                        "card-dark": "#374151", // Gray 700
                    },
                    fontFamily: {
                        display: ["Noto Sans KR", "sans-serif"],
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem', // 8px
                        'lg': '1rem', // 16px
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-light dark:text-text-dark transition-colors duration-300">
<div class="container mx-auto p-4 md:p-8 max-w-4xl">
<header class="flex items-center space-x-4 mb-8">
                <div class="flex items-center space-x-4 flex-grow">
                    <!--홈버튼-->
                    <button class="flex items-center gap-2 bg-primary text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-indigo-600 transition-colors">
                        <span class="material-icons">home</span>
                    </button>
                </div>
                <!--my버튼-->
                <button class="ml -4 bg-gray-200 dark:bg-gray-700 text-text-light dark:text-text-dark px-6 py-2 rounded-lg font-semibold shadow-md hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-300">MY</button>
            </header>
<main class="bg-card-light dark:bg-card-dark p-6 md:p-10 rounded-lg shadow-md">
<h1 class="text-3xl font-bold mb-8 text-center text-text-light dark:text-text-dark">프로필 편집</h1>
<div class="flex flex-col items-center mb-10">
<div class="relative">
<img alt="프로필 사진" class="w-32 h-32 md:w-40 md:h-40 rounded-full object-cover border-4 border-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCidvTpI_9ub5RlOUeoL-FKw1EGnukZU13R8VxdS-lpz8lMKjkwz6zVWdYPN3JX2xoTcki25MSRIGN_qJMy420lCcGWTNrAFot5w7dTG5ReSZRV6u79rSE5gl-z9TPChQnbr-W4lvKHP50YwTyzSiSyn1PtzNKJo1wWnvyd-lpZznf753iHHqKEAzr4XlpyYYuwvJaq2rkjdxJsAUDxvITNFxLAMhC-ykxxHgqlMTaCs9wK9AdIo5IkBAhULrsWOn9Wkb0RbFzMnA"/>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full hover:bg-indigo-700 transition-colors duration-200">
<span class="material-icons">photo_camera</span>
</button>
</div>
</div>
<div class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark">ID</label>
<div class="col-span-2 text-text-light dark:text-text-dark font-medium">your_user_id</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark">비밀번호</label>
<div class="col-span-2">
<button class="w-full md:w-auto px-4 py-2 bg-gray-200 dark:bg-gray-600 text-text-light dark:text-text-dark rounded-md font-medium hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors duration-200">
                            비밀번호 변경
                        </button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark" for="name">이름</label>
<input class="col-span-2 w-full p-3 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark rounded-md focus:ring-primary focus:border-primary" id="name" placeholder="이름을 입력하세요" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark">성별</label>
<div class="col-span-2 flex gap-4">
<button class="flex-1 py-2 px-4 border border-border-light dark:border-border-dark rounded-md hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">남</button>
<button class="flex-1 py-2 px-4 border border-border-light dark:border-border-dark rounded-md hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">여</button>
<button class="flex-1 py-2 px-4 border border-border-light dark:border-border-dark rounded-md bg-primary text-white">무응답</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark" for="birthdate">생년월일</label>
<input class="col-span-2 w-full p-3 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark rounded-md focus:ring-primary focus:border-primary" id="birthdate" type="date"/>
</div>
<hr class="border-border-light dark:border-border-dark my-8"/>
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark" for="email">Email</label>
<div class="col-span-2 flex flex-col md:flex-row gap-2">
<input class="flex-grow p-3 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark rounded-md focus:ring-primary focus:border-primary" id="email" placeholder="이메일 입력" type="email"/>
<button class="px-4 py-2 bg-primary text-white rounded-md font-semibold hover:bg-indigo-700 transition-colors duration-200">
                            인증메일 발송
                        </button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark" for="verification_code">인증코드</label>
<div class="col-span-2 flex flex-col md:flex-row items-start md:items-center gap-2">
<input class="flex-grow w-full p-3 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark rounded-md focus:ring-primary focus:border-primary" id="verification_code" placeholder="인증코드 입력" type="text"/>
<p class="text-green-600 dark:text-green-400 font-medium whitespace-nowrap mt-2 md:mt-0">인증되었습니다</p>
</div>
</div>
<hr class="border-border-light dark:border-border-dark my-8"/>
<div class="grid grid-cols-1 md:grid-cols-3 items-start gap-4">
<label class="font-semibold text-muted-light dark:text-muted-dark pt-2">정치성향</label>
<div class="col-span-2">
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 border border-border-light dark:border-border-dark rounded-full hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">진보</button>
<button class="px-4 py-2 border border-border-light dark:border-border-dark rounded-full hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">중도</button>
<button class="px-4 py-2 border border-border-light dark:border-border-dark rounded-full hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">보수</button>
<button class="px-4 py-2 border border-primary text-primary bg-indigo-100 dark:bg-indigo-900 rounded-full">모르겠다</button>
</div>
</div>
</div>
</div>
</main>
<footer class="mt-10 flex justify-end gap-4">
<button class="px-6 py-3 bg-gray-200 dark:bg-gray-600 text-text-light dark:text-text-dark rounded-md font-bold hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors duration-200">취소</button>
<button class="px-6 py-3 bg-primary text-white rounded-md font-bold hover:bg-indigo-700 transition-colors duration-200">완료</button>
</footer>
</div>

</body></html>
