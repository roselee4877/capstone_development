<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#6366F1",
                        "background-light": "#F9FAFB",
                        "background-dark": "#1F2937",
                        "card-light": "#FFFFFF",
                        "card-dark": "#374151",
                        "text-light": "#111827",
                        "text-dark": "#F9FAFB",
                        "subtext-light": "#6B7280",
                        "subtext-dark": "#9CA3AF",
                        "border-light": "#E5E7EB",
                        "border-dark": "#4B5563"
                    },
                    fontFamily: {
                        display: ["Noto Sans KR", "sans-serif"],
                    },
                    borderRadius: {
                        'lg': "0.5rem",
                        'xl': "1rem",
                        '2xl': "1.5rem",
                        '3xl': "2rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
    <body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark font-display">
        <div class="container mx-auto p-4 sm:p-6 lg:p-8">
            <header class="flex items-center space-x-4 mb-8">
                <div class="flex items-center space-x-4 flex-grow">
                    <!--홈버튼-->
                    <button class="flex items-center gap-2 bg-primary text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-indigo-600 transition-colors">
                        <span class="material-icons">home</span>
                    </button>
                </div>
                <!--my버튼-->
                <button class="ml -4 bg-gray-200 dark:bg-gray-700 text-text-light dark:text-text-dark px-6 py-2 rounded-lg font-semibold shadow-md hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-300">MY</button>
            </header>
<main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<div class="lg:col-span-1 flex flex-col items-center bg-card-light dark:bg-card-dark p-8 rounded-2xl shadow-lg">
<div class="relative mb-4">
<img alt="프로필 사진" class="w-32 h-32 rounded-full object-cover border-4 border-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQ0bTDKSAPrnFmmjqL2WKbyF0OycpUVQBJfEQrWZCEE-neweHM8oBMot9iYOetBxeJqDzQhs3hjr0tV2jSKmyfA8jDJovCCrft98own1gQ-wijmZgopbl5ivEBLGWEvleD_DS-owup-xV6i0aEEOIcvLSWlFnKbfk4BvDWEPhmZuarebO8Sn4UfmrqJRXI_y51vIonAzrmS3zE0ECREPoMhtmj7cXKXOb7vQKv9JOESkD895oyTGqLIacaKfqSapg58AhaOCIR2bg"/>
</div>
<h2 class="text-2xl font-bold mb-4">사용자 이름</h2>
<button class="w-full py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">프로필 편집</button>
</div>
<div class="lg:col-span-2 bg-card-light dark:bg-card-dark p-8 rounded-2xl shadow-lg">
<h3 class="text-2xl font-bold mb-6 border-b border-border-light dark:border-border-dark pb-4">내 정보</h3>
<div class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
<label class="font-semibold text-subtext-light dark:text-subtext-dark">ID</label>
<p class="md:col-span-2 p-3 bg-background-light dark:bg-background-dark rounded-lg">user123</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
<label class="font-semibold text-subtext-light dark:text-subtext-dark">이름</label>
<p class="md:col-span-2 p-3 bg-background-light dark:bg-background-dark rounded-lg">홍길동</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
<label class="font-semibold text-subtext-light dark:text-subtext-dark">성별</label>
<p class="md:col-span-2 p-3 bg-background-light dark:bg-background-dark rounded-lg">남성</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
<label class="font-semibold text-subtext-light dark:text-subtext-dark">생년월일</label>
<p class="md:col-span-2 p-3 bg-background-light dark:bg-background-dark rounded-lg">1995-01-01</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
<label class="font-semibold text-subtext-light dark:text-subtext-dark">Email</label>
<p class="md:col-span-2 p-3 bg-background-light dark:bg-background-dark rounded-lg">user@example.com</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
<label class="font-semibold text-subtext-light dark:text-subtext-dark" for="political_stance">정치성향</label>
<input class="md:col-span-2 w-full p-3 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark focus:ring-primary focus:border-primary transition" id="political_stance" placeholder="정치성향을 입력하세요" type="text"/>
</div>
</div>
</div>
<div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-8">
<button class="w-full flex items-center justify-center gap-2 p-6 bg-primary text-white rounded-xl shadow-lg hover:bg-primary/90 transition-transform hover:scale-105">
<span class="material-icons">article</span>
<span class="text-lg font-semibold">내가 본 기사</span>
</button>
<button class="w-full flex items-center justify-center gap-2 p-6 bg-primary text-white rounded-xl shadow-lg hover:bg-primary/90 transition-transform hover:scale-105">
<span class="material-icons">comment</span>
<span class="text-lg font-semibold">내가 단 댓글</span>
</button>
</div>
</main>
<footer class="mt-12 flex justify-end items-center gap-4">
<button class="px-6 py-2 text-subtext-light dark:text-subtext-dark hover:text-red-500 dark:hover:text-red-400 transition-colors">로그아웃</button>
<button class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">회원 탈퇴</button>
</footer>
</div>

</body></html>
